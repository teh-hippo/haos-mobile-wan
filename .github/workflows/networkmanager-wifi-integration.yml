name: NetworkManager Wi-Fi integration

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qemu:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Enable KVM
        run: |
          test -c /dev/kvm
          sudo chmod 0666 /dev/kvm

      - name: Install QEMU dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            genisoimage \
            qemu-system-x86 \
            qemu-utils \
            rsync

      - name: Cache Debian cloud image
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/haos-mobile-wan-qemu
          key: debian-13-generic-amd64-78f658893d7aecb5

      - name: Run QEMU Wi-Fi and generic USB lab
        timeout-minutes: 28
        run: ./ha_cellular_gateway/integration/networkmanager_wifi/run.sh

      - name: Print QEMU lab logs
        if: always()
        run: |
          find ha_cellular_gateway/integration/networkmanager_wifi/logs \
            -maxdepth 3 -type f -print -exec tail -n 120 {} \; || true

      - name: Upload QEMU lab logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: networkmanager-wifi-integration-logs
          path: ha_cellular_gateway/integration/networkmanager_wifi/logs
          if-no-files-found: warn
