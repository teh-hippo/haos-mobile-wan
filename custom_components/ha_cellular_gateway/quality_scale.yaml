rules:
  # Self-assessment for this optional custom integration only. It records the
  # current repository state but is not a formal Home Assistant Core Platinum
  # tier claim.
  # Bronze
  action-setup:
    status: exempt
    comment: The integration does not register custom actions or services.
  appropriate-polling:
    status: done
    comment: The coordinator polls the gateway API every 30 seconds.
  brands:
    status: done
    comment: Local custom integration brand assets are shipped under brand/.
  common-modules:
    status: done
    comment: Shared API, coordinator, entity, diagnostics, and repairs logic live in dedicated modules.
  config-flow-test-coverage:
    status: done
    comment: Focused pytest coverage exercises manual, discovery, reauth, and reconfigure flows.
  config-flow:
    status: done
    comment: The integration uses a UI config flow with field descriptions and stores credentials in ConfigEntry.data.
  dependency-transparency:
    status: done
    comment: Manifest dependencies are declared explicitly and there are no hidden runtime package installs.
  docs-actions:
    status: exempt
    comment: The integration does not expose custom actions or services.
  docs-triggers:
    status: exempt
    comment: The integration does not expose custom triggers.
  docs-conditions:
    status: exempt
    comment: The integration does not expose custom conditions.
  docs-high-level-description:
    status: done
    comment: The README explains the HAOS app and the optional integration separately.
  docs-installation-instructions:
    status: done
    comment: The README documents separate installation steps for the app and the optional HACS integration.
  docs-removal-instructions:
    status: done
    comment: The README documents separate removal steps for the app and the optional HACS integration.
  entity-event-setup:
    status: exempt
    comment: Entities are coordinator-driven and do not subscribe to direct event streams.
  entity-unique-id:
    status: done
    comment: Every entity uses a config-entry-scoped unique ID.
  has-entity-name:
    status: done
    comment: Base entities set has_entity_name for all platforms.
  runtime-data:
    status: done
    comment: Runtime state is stored on ConfigEntry.runtime_data.
  test-before-configure:
    status: done
    comment: Manual, discovery, reauth, and reconfigure paths validate the gateway API before saving changes.
  test-before-setup:
    status: done
    comment: Entry setup performs an initial coordinator refresh before platform setup completes.
  unique-config-entry:
    status: done
    comment: The flow prevents multiple distinct gateway entries and deduplicates by URL or discovery UUID.

  # Silver
  action-exceptions:
    status: exempt
    comment: The integration does not expose custom actions or services.
  config-entry-unloading:
    status: done
    comment: Unload forwards to all platforms and clears Repairs state.
  docs-configuration-parameters:
    status: done
    comment: The README documents the manual URL and token parameters.
  docs-installation-parameters:
    status: done
    comment: The README documents the HACS repository URL, category, and integration domain.
  entity-unavailable:
    status: done
    comment: CoordinatorEntity availability tracks refresh success automatically.
  integration-owner:
    status: done
    comment: The manifest declares a code owner.
  log-when-unavailable:
    status: done
    comment: DataUpdateCoordinator handles unavailable logging without custom log spam loops.
  parallel-updates:
    status: done
    comment: Each entity platform declares PARALLEL_UPDATES = 0.
  reauthentication-flow:
    status: done
    comment: The integration exposes a dedicated reauthentication flow for token changes.
  test-coverage:
    status: done
    comment: CI enforces greater than 95 percent coverage for every integration module.

  # Gold
  devices:
    status: done
    comment: Entities attach to one gateway device per config entry.
  diagnostics:
    status: done
    comment: Diagnostics export redacted config-entry data and runtime state.
  discovery-update-info:
    status: done
    comment: Supervisor discovery updates the stored URL and token for an existing entry.
  discovery:
    status: done
    comment: The integration supports Supervisor discovery from the HAOS app.
  docs-data-update:
    status: done
    comment: The README documents 30-second polling and immediate refresh after control actions.
  docs-examples:
    status: done
    comment: The README includes concrete automation examples.
  docs-known-limitations:
    status: done
    comment: The README documents current integration and distribution limitations.
  docs-supported-devices:
    status: done
    comment: The README lists supported and unsupported hardware and topologies.
  docs-supported-functions:
    status: done
    comment: The README documents entities, controls, repairs, diagnostics, and discovery behaviour.
  docs-troubleshooting:
    status: done
    comment: The README includes targeted troubleshooting guidance.
  docs-use-cases:
    status: done
    comment: The README includes concrete dashboarding and automation use cases.
  dynamic-devices:
    status: exempt
    comment: The integration models a single fixed gateway device per config entry.
  entity-category:
    status: done
    comment: Diagnostic and configuration entities declare entity categories where appropriate.
  entity-device-class:
    status: done
    comment: Relevant binary sensors and enum sensors declare device classes.
  entity-disabled-by-default:
    status: done
    comment: Diagnostic-heavy entities default to disabled where appropriate.
  entity-translations:
    status: done
    comment: Entity names and enum states are translation-key driven.
  exception-translations:
    status: done
    comment: Runtime control failures raise translated HomeAssistantError instances.
  icon-translations:
    status: exempt
    comment: The integration does not define state-based translated icons.
  reconfiguration-flow:
    status: done
    comment: The integration exposes a dedicated reconfigure flow for URL and token updates.
  repair-issues:
    status: done
    comment: Stable repairable app issues are synchronized into Home Assistant Repairs.
  stale-devices:
    status: exempt
    comment: The integration represents one fixed device per config entry and does not create orphan device trees.

  # Platinum
  async-dependency:
    status: done
    comment: Network I/O is asyncio-native.
  inject-websession:
    status: done
    comment: HTTP requests use Home Assistant's injected aiohttp client session.
  strict-typing:
    status: done
    comment: CI runs mypy against the custom integration and the integration uses typed status models.
