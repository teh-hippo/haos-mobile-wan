name: NetworkManager integration

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  networkmanager:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Run rootful NetworkManager lab
        timeout-minutes: 12
        run: ./ha_cellular_gateway/integration/networkmanager/run.sh

      - name: Capture and tear down integration lab
        if: always()
        run: |
          log_dir=ha_cellular_gateway/integration/networkmanager/logs
          compose=ha_cellular_gateway/integration/networkmanager/compose.yaml
          mkdir -p "$log_dir"
          docker compose -f "$compose" stop --timeout 10 || true
          docker compose -f "$compose" logs --no-color \
            >>"$log_dir/compose.log" 2>&1 || true
          docker compose -f "$compose" down --volumes --remove-orphans || true

      - name: Print integration logs
        if: always()
        run: cat ha_cellular_gateway/integration/networkmanager/logs/compose.log || true

      - name: Upload integration logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: networkmanager-integration-logs
          path: ha_cellular_gateway/integration/networkmanager/logs
          if-no-files-found: warn
