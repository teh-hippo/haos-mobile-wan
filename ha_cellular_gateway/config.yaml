name: HAOS Mobile WAN
version: "0.5.0"
slug: ha_cellular_gateway
description: Provides fallback WAN through Wi-Fi or iPhone USB tethering
url: https://github.com/teh-hippo/haos-mobile-wan
arch:
  - aarch64
startup: services
boot: manual
stage: experimental
breaking_versions:
  - "0.3.0"
  - "0.3.18"
  - "0.4.0"
  - "0.4.3"
init: false
host_network: true
host_dbus: true
hassio_api: true
hassio_role: manager
services:
  - mqtt:need
usb: true
privileged:
  - NET_ADMIN
  - NET_RAW
apparmor: true
timeout: 30
backup_exclude:
  - dnsmasq.leases
options:
  enabled: false
  mobile_connection: Wi-Fi hotspot
  hotspot_ssid: ""
  hotspot_password: ""
schema:
  enabled: bool
  mobile_connection: 'list(Wi-Fi hotspot|USB (iPhone)|USB (iPhone), Wi-Fi fallback)'
  hotspot_ssid: str
  hotspot_password: password
  downstream_mac: 'match(^$|^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$)?'
  router_address: str?
  upstream_interface: 'match(^[A-Za-z0-9_.-]{1,15}$)?'
  upstream_address: str?
  upstream_gateway: str?
