configuration:
  mode:
    name: Gateway mode
    description: >-
      Disabled performs no forwarding. Trial enables the gateway temporarily
      and rolls back after the configured trial period. Active keeps the
      gateway enabled while the app is running.
  dry_run:
    name: Dry run
    description: >-
      Prevent all activation changes. Leave enabled until every safety check
      passes and the downstream cable is connected only to a router WAN port.
  upstream_mode:
    name: Upstream mode
    description: >-
      hotspot_wifi keeps the existing static Wi-Fi hotspot path. iphone_usb is
      an experimental iPhone USB-tethering path that pairs with the phone and
      acquires DHCP without using the management Ethernet.
  upstream_interface:
    name: Optional - hotspot interface override
    description: >-
      Used only for hotspot_wifi mode. Leave unset to use wlan0. iphone_usb
      discovers the ipheth interface dynamically.
  upstream_address:
    name: Optional - hotspot IPv4 address override
    description: Used only for hotspot_wifi mode. Leave unset for 172.20.10.4/28.
  upstream_gateway:
    name: Optional - hotspot gateway override
    description: >-
      Used only for hotspot_wifi mode. Leave unset for 172.20.10.1.
  downstream_mac:
    name: USB Ethernet adapter override
    description: >-
      Leave blank to select the only attached USB Ethernet adapter. Set its
      MAC address only when more than one eligible adapter is attached.
  downstream_address:
    name: Downstream gateway address
    description: >-
      Private IPv4 gateway in CIDR notation. The app adds this exact address
      during activation and removes it during rollback or shutdown.
