configuration:
  mode:
    name: Gateway mode
    description: >-
      Disabled performs no forwarding. Trial enables the gateway temporarily
      and rolls back after the configured trial period. Active keeps the
      gateway enabled while the app is running.
  dry_run:
    name: Dry run
    description: >-
      Prevent all activation changes. Leave enabled until every safety check
      passes and the downstream cable is connected only to a router WAN port.
  management_interface:
    name: Management interface
    description: >-
      HAOS interface that must retain the normal Home Assistant LAN and its
      main default route.
  management_address:
    name: Management IPv4 address
    description: Expected static management address in CIDR notation.
  upstream_interface:
    name: Mobile upstream interface
    description: Wi-Fi interface associated with the phone hotspot.
  upstream_ssid:
    name: Mobile hotspot name
    description: Informational SSID expected on the upstream Wi-Fi interface.
  upstream_address:
    name: Mobile upstream IPv4 address
    description: Static hotspot address in CIDR notation.
  upstream_gateway:
    name: Mobile upstream gateway
    description: Phone hotspot gateway used only in the dedicated policy table.
  downstream_mac:
    name: Downstream USB Ethernet MAC
    description: >-
      Lowercase colon-separated MAC address of the USB Ethernet adapter
      connected to the router WAN port.
  downstream_address:
    name: Downstream gateway address
    description: Static IPv4 address served to the router WAN side.
  transit_subnet:
    name: Downstream transit subnet
    description: Isolated IPv4 subnet used only between HAOS and the router WAN.
  dhcp_start:
    name: DHCP range start
    description: First address offered to the downstream router.
  dhcp_end:
    name: DHCP range end
    description: Last address offered to the downstream router.
  dns_servers:
    name: Advertised DNS servers
    description: Public IPv4 DNS servers offered to the downstream router.
  routing_table:
    name: Advanced - policy routing table
    description: Dedicated Linux routing table. Change only to resolve a conflict.
  reconcile_seconds:
    name: Advanced - reconciliation interval
    description: Seconds between safety and runtime-state checks.
  trial_seconds:
    name: Trial duration
    description: Seconds before trial mode automatically disables the gateway.
  api_bind:
    name: Advanced - local API bind address
    description: Supervisor-side host address used by the optional integration.
  api_port:
    name: Advanced - local API port
    description: Supervisor-side port used by the optional integration.
