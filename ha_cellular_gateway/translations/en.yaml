configuration:
  auto_disable_minutes:
    name: Auto-disable after disconnect
    description: Minutes without an active gateway before stopping the add-on. Set to 0 to keep it running.
  mobile_connection:
    name: Mobile connection
  upstream_interface:
    name: Wi-Fi interface
    description: "Default: wlan0."
  upstream_address:
    name: Wi-Fi address
    description: "Default: 172.20.10.4/28."
  upstream_gateway:
    name: Wi-Fi gateway
    description: "Default: 172.20.10.1."
  hotspot_ssid:
    name: Wi-Fi hotspot name
  hotspot_password:
    name: Wi-Fi hotspot password
  downstream_mac:
    name: Router adapter MAC address
    description: Set only when more than one USB Ethernet adapter is attached.
  router_address:
    name: Router WAN address
    description: "Default: 192.168.80.1/24. Change only if it overlaps another network."
