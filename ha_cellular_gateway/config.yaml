name: Mobile WAN
version: "1.0.1"
slug: ha_cellular_gateway
description: Provides fallback WAN through Wi-Fi or USB tethering
url: https://github.com/teh-hippo/haos-mobile-wan
image: ghcr.io/teh-hippo/haos-mobile-wan
arch:
  - aarch64
startup: services
boot: manual
breaking_versions:
  - "0.3.0"
  - "0.3.18"
  - "0.4.0"
  - "0.4.3"
  - "0.6.0"
  - "0.8.0"
  - "0.9.0"
  - "0.10.0"
  - "0.11.0"
  - "1.0.0"
init: false
host_network: true
host_dbus: true
hassio_api: true
hassio_role: manager
services:
  - mqtt:need
usb: true
privileged:
  - NET_ADMIN
  - NET_RAW
timeout: 90
backup_exclude:
  - dnsmasq.leases
options:
  auto_disable_minutes: 30
  mobile_connection: Wi-Fi hotspot
  hotspot_ssid: ""
  hotspot_password: ""
schema:
  auto_disable_minutes: int(0,1440)
  mobile_connection: 'list(Wi-Fi hotspot|USB (iPhone)|USB (iPhone), Wi-Fi fallback|USB (generic)|USB (generic), Wi-Fi fallback)'
  hotspot_ssid: str
  hotspot_password: password
  downstream_mac: 'match(^$|^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$)?'
  router_address: str?
  upstream_interface: 'match(^[A-Za-z0-9_.-]{1,15}$)?'
  upstream_address: str?
  upstream_gateway: str?
