name: Builder

on:
  pull_request:
    paths:
      - .github/workflows/builder.yml
      - ha_cellular_gateway/config.yaml
      - ha_cellular_gateway/Dockerfile
      - ha_cellular_gateway/rootfs/**
      - pyproject.toml
      - uv.lock
  push:
    branches:
      - main
    paths:
      - .github/workflows/builder.yml
      - ha_cellular_gateway/config.yaml
      - ha_cellular_gateway/Dockerfile
      - ha_cellular_gateway/rootfs/**
      - pyproject.toml
      - uv.lock

permissions:
  contents: read

env:
  ARCHITECTURES: '["aarch64"]'
  IMAGE_NAME: haos-mobile-wan
  REGISTRY_PREFIX: ghcr.io/teh-hippo

jobs:
  init:
    name: initialize
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"

      - run: uv sync --frozen

      - name: Read app version
        id: metadata
        run: |
          version=$(uv run python - <<'PY'
          from pathlib import Path
          import yaml

          app = yaml.safe_load(
              Path("ha_cellular_gateway/config.yaml").read_text(encoding="utf-8")
          )
          print(app["version"])
          PY
          )
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Prepare build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@4de35182ce1e329181bffcbcc84d33db5e2c7e10 # 2026.06.0
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-prefix: ${{ env.REGISTRY_PREFIX }}

  build:
    name: build ${{ matrix.arch }}
    needs: init
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Build image
        uses: home-assistant/builder/actions/build-image@4de35182ce1e329181bffcbcc84d33db5e2c7e10 # 2026.06.0
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: ./ha_cellular_gateway
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest
          labels: |
            io.hass.type=app
            io.hass.name=Mobile WAN
            io.hass.description=Provides fallback WAN through Wi-Fi or USB tethering
            io.hass.url=https://github.com/teh-hippo/haos-mobile-wan
          push: ${{ github.event_name == 'push' }}
          version: ${{ needs.init.outputs.version }}

  manifest:
    name: publish manifest
    needs:
      - init
      - build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Publish manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@4de35182ce1e329181bffcbcc84d33db5e2c7e10 # 2026.06.0
        with:
          architectures: ${{ env.ARCHITECTURES }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest
          registry-prefix: ${{ env.REGISTRY_PREFIX }}

  verify:
    name: verify published image
    needs:
      - init
      - manifest
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify image signature
        uses: home-assistant/builder/actions/cosign-verify@4de35182ce1e329181bffcbcc84d33db5e2c7e10 # 2026.06.0
        with:
          image: ${{ env.REGISTRY_PREFIX }}/${{ env.IMAGE_NAME }}:${{ needs.init.outputs.version }}
          cosign-identity: ^https://github\.com/teh-hippo/haos-mobile-wan/\.github/workflows/builder\.yml@refs/heads/main$

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Smoke test published image
        env:
          IMAGE: ${{ env.REGISTRY_PREFIX }}/${{ env.IMAGE_NAME }}:${{ needs.init.outputs.version }}
          VERSION: ${{ needs.init.outputs.version }}
        run: |
          docker pull --platform linux/arm64 "$IMAGE"
          test "$(docker inspect \
            --format '{{ index .Config.Labels "io.hass.version" }}' \
            "$IMAGE")" = "$VERSION"
          docker run --rm \
            --platform linux/arm64 \
            --entrypoint /usr/bin/python3 \
            "$IMAGE" -c "import app.main; print('published-image-ok')"
