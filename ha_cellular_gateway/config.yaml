name: HAOS Mobile WAN
version: "0.1.0"
slug: ha_cellular_gateway
description: Redundant mobile WAN gateway engine for Home Assistant OS
url: https://github.com/teh-hippo/haos-mobile-wan
arch:
  - aarch64
startup: services
boot: manual
init: false
host_network: true
host_dbus: true
hassio_api: true
discovery:
  - ha_cellular_gateway
privileged:
  - NET_ADMIN
  - NET_RAW
apparmor: true
options:
  mode: disabled
  dry_run: true
  management_interface: end0
  management_address: 192.168.1.2/24
  upstream_interface: wlan0
  upstream_ssid: MobileHotspot
  upstream_address: 172.20.10.4/28
  upstream_gateway: 172.20.10.1
  downstream_mac: ""
  downstream_address: 192.168.80.1/24
  transit_subnet: 192.168.80.0/24
  dhcp_start: 192.168.80.10
  dhcp_end: 192.168.80.50
  dns_servers:
    - 1.1.1.1
    - 8.8.8.8
  routing_table: 201
  reconcile_seconds: 5
  trial_seconds: 300
  api_bind: 172.30.32.1
  api_port: 8099
schema:
  mode: list(disabled|trial|active)
  dry_run: bool
  management_interface: str
  management_address: str
  upstream_interface: str
  upstream_ssid: str
  upstream_address: str
  upstream_gateway: str
  downstream_mac: str
  downstream_address: str
  transit_subnet: str
  dhcp_start: str
  dhcp_end: str
  dns_servers:
    - str
  routing_table: int
  reconcile_seconds: int
  trial_seconds: int
  api_bind: str
  api_port: port
