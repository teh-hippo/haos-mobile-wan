name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check pyyaml

      - name: Run unit tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPATH: ha_cellular_gateway
        run: python -m unittest discover -s ha_cellular_gateway/tests -v

      - name: Compile Python
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          PYTHONPATH=ha_cellular_gateway python -m py_compile \
            ha_cellular_gateway/rootfs/app/*.py
          PYTHONPATH=ha_cellular_gateway/rootfs python -c "import app.main"

      - name: Validate JSON and YAML
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import yaml

          for path in Path(".").rglob("*.json"):
              json.loads(path.read_text(encoding="utf-8"))

          for pattern in ("*.yaml", "*.yml"):
              for path in Path(".").rglob(pattern):
                  yaml.safe_load(path.read_text(encoding="utf-8"))

          app = yaml.safe_load(
              Path("ha_cellular_gateway/config.yaml").read_text(encoding="utf-8")
          )
          assert app["arch"] == ["aarch64"]
          assert app["host_network"] is True
          assert app["hassio_api"] is True
          assert app["hassio_role"] == "manager"
          assert app["usb"] is True
          assert app["apparmor"] is True
          assert app["privileged"] == ["NET_ADMIN", "NET_RAW"]
          assert app.get("full_access") in (None, False)
          assert app["host_dbus"] is True
          assert app.get("udev") in (None, False)
          assert Path("ha_cellular_gateway/DOCS.md").exists()
          assert Path("ha_cellular_gateway/translations/en.yaml").exists()

          app_dir = Path("ha_cellular_gateway/rootfs/app")
          for path in app_dir.glob("*.py"):
              line_count = len(path.read_text(encoding="utf-8").splitlines())
              assert line_count <= 250, f"{path} has {line_count} lines"

          dockerfile = Path(
              "ha_cellular_gateway/Dockerfile"
          ).read_text(encoding="utf-8")
          assert "ARG BUILD_FROM" not in dockerfile
          assert dockerfile.startswith(
              "FROM ghcr.io/home-assistant/base:"
          )

          profile = Path("ha_cellular_gateway/apparmor.txt").read_text(
              encoding="utf-8"
          )
          assert "complain" not in profile
          for fragment in (
              "/run/**",
              "/proc/**",
              "/sys/bus/usb/**",
              "/sys/module/**",
              "/usr/sbin/conntrack",
          ):
              assert fragment not in profile
          for fragment in (
              "capability net_admin,",
              "capability net_raw,",
              "/run/dbus/system_bus_socket rw,",
              "peer=(name=org.freedesktop.NetworkManager),",
              "/run/ha-cellgw/** rwk,",
              "/run/usbmuxd rw,",
              "/run/usbmuxd/** rwk,",
              "/var/run/usbmuxd rw,",
              "/var/lib/lockdown/** rwk,",
              "/proc/sys/net/ipv4/** r,",
              "/dev/bus/usb/** rw,",
              "/usr/bin/nmcli rix,",
              "/sys/bus/usb/devices/ r,",
              "/sys/bus/usb/devices/** r,",
              "/sys/bus/usb/drivers/ipheth/** r,",
              "/sys/bus/usb/drivers/rndis_host/** r,",
              "/sys/bus/usb/drivers/cdc_ether/** r,",
              "/sys/bus/usb/drivers/cdc_ncm/** r,",
              "/sys/module/ipheth/** r,",
          ):
              assert fragment in profile
          assert "/sbin/udhcpc" not in profile
          assert "udhcpc.script" not in profile
          PY

      - name: Parse AppArmor profile
        run: apparmor_parser -QK ha_cellular_gateway/apparmor.txt

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build aarch64 app image
        run: |
          VERSION=$(python - <<'PY'
          from pathlib import Path
          import yaml
          app = yaml.safe_load(
              Path("ha_cellular_gateway/config.yaml").read_text(encoding="utf-8")
          )
          print(app["version"])
          PY
          )
          docker buildx build \
            --platform linux/arm64 \
            --build-arg BUILD_VERSION="$VERSION" \
            --build-arg BUILD_ARCH=aarch64 \
            --file ha_cellular_gateway/Dockerfile \
            --tag haos-mobile-wan:ci \
            --load \
            ha_cellular_gateway

      - name: Smoke test app startup under AppArmor
        run: |
          sudo apparmor_parser -r ha_cellular_gateway/apparmor.txt
          # Exercise the real interpreter and app import under the runtime
          # profile; full main() binds the Supervisor-only address 172.30.32.1.
          output=$(docker run --rm \
            --security-opt apparmor=ha_cellular_gateway \
            --cap-add NET_ADMIN \
            --cap-add NET_RAW \
            --entrypoint /usr/bin/python3 \
            haos-mobile-wan:ci -c "import app.main; print('startup-ok')")
          echo "$output"
          echo "$output" | grep -q startup-ok
