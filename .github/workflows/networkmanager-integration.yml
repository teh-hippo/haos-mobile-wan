name: NetworkManager integration

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'
  pull_request:
    paths:
      - .github/workflows/networkmanager-integration.yml
      - ha_cellular_gateway/integration/networkmanager/**
      - ha_cellular_gateway/rootfs/app/dhcp.py
      - ha_cellular_gateway/rootfs/app/downstream.py
      - ha_cellular_gateway/rootfs/app/firewall*.py
      - ha_cellular_gateway/rootfs/app/netfilter*.py
      - ha_cellular_gateway/rootfs/app/networkmanager*.py
      - ha_cellular_gateway/rootfs/app/nm_*.py
      - ha_cellular_gateway/rootfs/app/policy*.py
      - ha_cellular_gateway/rootfs/app/mobile_connection.py
      - ha_cellular_gateway/rootfs/app/upstream*.py
      - ha_cellular_gateway/rootfs/app/usb_network.py
      - ha_cellular_gateway/rootfs/app/usb_upstream_factory.py
      - ha_cellular_gateway/rootfs/app/wifi_activation.py
      - ha_cellular_gateway/rootfs/app/wifi_custody*.py

permissions:
  contents: read

jobs:
  networkmanager:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Run rootful NetworkManager lab
        timeout-minutes: 12
        run: ./ha_cellular_gateway/integration/networkmanager/run.sh

      - name: Capture and tear down integration lab
        if: always()
        run: |
          log_dir=ha_cellular_gateway/integration/networkmanager/logs
          compose=ha_cellular_gateway/integration/networkmanager/compose.yaml
          mkdir -p "$log_dir"
          docker compose -f "$compose" stop --timeout 10 || true
          docker compose -f "$compose" logs --no-color \
            >>"$log_dir/compose.log" 2>&1 || true
          docker compose -f "$compose" down --volumes --remove-orphans || true

      - name: Print integration logs
        if: always()
        run: cat ha_cellular_gateway/integration/networkmanager/logs/compose.log || true

      - name: Upload integration logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: networkmanager-integration-logs
          path: ha_cellular_gateway/integration/networkmanager/logs
          if-no-files-found: warn
