name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check mypy pyyaml

      - name: Run unit tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPATH: ha_cellular_gateway
        run: python -m unittest discover -s ha_cellular_gateway/tests -v

      - name: Compile Python
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          PYTHONPATH=ha_cellular_gateway python -m py_compile \
            ha_cellular_gateway/rootfs/app/*.py \
            custom_components/ha_cellular_gateway/*.py
          PYTHONPATH=ha_cellular_gateway/rootfs python -c "import app.main"

      - name: Run integration type checks
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m mypy --config-file mypy.ini

      - name: Validate JSON and YAML
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import yaml

          for path in Path(".").rglob("*.json"):
              json.loads(path.read_text(encoding="utf-8"))

          for pattern in ("*.yaml", "*.yml"):
              for path in Path(".").rglob(pattern):
                  yaml.safe_load(path.read_text(encoding="utf-8"))

          app = yaml.safe_load(
              Path("ha_cellular_gateway/config.yaml").read_text(encoding="utf-8")
          )
          integration = json.loads(
              Path(
                  "custom_components/ha_cellular_gateway/manifest.json"
              ).read_text(encoding="utf-8")
          )
          assert app["version"] == integration["version"]
          strings = json.loads(
              Path(
                  "custom_components/ha_cellular_gateway/strings.json"
              ).read_text(encoding="utf-8")
          )
          runtime_translations = json.loads(
              Path(
                  "custom_components/ha_cellular_gateway/translations/en.json"
              ).read_text(encoding="utf-8")
          )
          assert strings == runtime_translations
          assert Path("ha_cellular_gateway/DOCS.md").exists()
          assert Path("ha_cellular_gateway/translations/en.yaml").exists()

          for path in Path("ha_cellular_gateway/rootfs/app").glob("*.py"):
              line_count = len(path.read_text(encoding="utf-8").splitlines())
              assert line_count <= 300, f"{path} has {line_count} lines"

          dockerfile = Path(
              "ha_cellular_gateway/Dockerfile"
          ).read_text(encoding="utf-8")
          assert "ARG BUILD_FROM" not in dockerfile
          assert dockerfile.startswith(
              "FROM ghcr.io/home-assistant/base:"
          )
          PY
