name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.13"

      - run: uv sync --frozen

      - name: Validate release contract
        if: github.event_name == 'pull_request'
        run: >-
          uv run python tools/release_contract.py
          ${{ github.event.pull_request.base.sha }}

      - name: Lint Python
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Enforce whole-runtime complexity budget
        run: >-
          uv run ruff check --select C901
          --config 'lint.mccabe.max-complexity=15'
          ha_cellular_gateway/rootfs/app

      - name: Type-check Python
        run: uv run mypy ha_cellular_gateway/rootfs/app tools

      - name: Run unit tests with branch coverage
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPATH: ha_cellular_gateway
        run: |
          uv run coverage run -m unittest discover \
            -s ha_cellular_gateway/tests -v
          uv run coverage report

  repository:
    name: repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.13"

      - run: uv sync --frozen

      - name: Lint shell and workflows
        run: |
          git ls-files -z '*.sh' | xargs -0 uv run shellcheck -x
          uv run actionlint

      - name: Compile Python
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          PYTHONPATH=ha_cellular_gateway uv run python -m py_compile \
            ha_cellular_gateway/rootfs/app/*.py
          PYTHONPATH=ha_cellular_gateway/rootfs \
            uv run python -c "import app.main"

      - name: Validate JSON and YAML
        run: |
          uv run python - <<'PY'
          from pathlib import Path
          import json
          import yaml

          for path in Path(".").rglob("*.json"):
              json.loads(path.read_text(encoding="utf-8"))

          for pattern in ("*.yaml", "*.yml"):
              for path in Path(".").rglob(pattern):
                  yaml.safe_load(path.read_text(encoding="utf-8"))

          app = yaml.safe_load(
              Path("ha_cellular_gateway/config.yaml").read_text(encoding="utf-8")
          )
          assert app["arch"] == ["aarch64"]
          assert app["host_network"] is True
          assert app["hassio_api"] is True
          assert app["hassio_role"] == "manager"
          assert app["usb"] is True
          assert app["apparmor"] is True
          assert app["privileged"] == ["NET_ADMIN", "NET_RAW"]
          assert app.get("full_access") in (None, False)
          assert app["host_dbus"] is True
          assert app.get("udev") in (None, False)
          assert Path("ha_cellular_gateway/DOCS.md").exists()
          assert Path("ha_cellular_gateway/translations/en.yaml").exists()

          dockerfile = Path(
              "ha_cellular_gateway/Dockerfile"
          ).read_text(encoding="utf-8")
          assert "ARG BUILD_FROM" not in dockerfile
          assert dockerfile.startswith(
              "FROM ghcr.io/home-assistant/base:"
          )

          profile = Path("ha_cellular_gateway/apparmor.txt").read_text(
              encoding="utf-8"
          )
          assert "complain" not in profile
          for fragment in (
              "/run/**",
              "/proc/**",
              "/sys/bus/usb/**",
              "/sys/module/**",
              "/usr/sbin/conntrack",
          ):
              assert fragment not in profile
          for fragment in (
              "capability net_admin,",
              "capability net_raw,",
              "/run/dbus/system_bus_socket rw,",
              "peer=(name=org.freedesktop.NetworkManager),",
              "/run/ha-cellgw/** rwk,",
              "/run/usbmuxd rw,",
              "/run/usbmuxd/** rwk,",
              "/var/run/usbmuxd rw,",
              "/var/lib/lockdown/** rwk,",
              "/proc/sys/net/ipv4/** r,",
              "/dev/bus/usb/** rw,",
              "/usr/bin/nmcli rix,",
              "/sys/bus/usb/devices/ r,",
              "/sys/bus/usb/devices/** r,",
              "/sys/bus/usb/drivers/ipheth/** r,",
              "/sys/bus/usb/drivers/rndis_host/** r,",
              "/sys/bus/usb/drivers/cdc_ether/** r,",
              "/sys/bus/usb/drivers/cdc_ncm/** r,",
              "/sys/module/ipheth/** r,",
          ):
              assert fragment in profile
          assert "/sbin/udhcpc" not in profile
          assert "udhcpc.script" not in profile
          PY

      - name: Validate source structure
        run: uv run python tools/structure_contract.py

      - name: Lint Home Assistant app
        uses: frenck/action-addon-linter@f995494fd84fae6310d23617e66d0e37de4f14eb # v2.21.0
        with:
          path: ./ha_cellular_gateway

      - name: Parse AppArmor profile
        run: apparmor_parser -QK ha_cellular_gateway/apparmor.txt

  image:
    name: image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.13"

      - run: uv sync --frozen

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build aarch64 app image
        run: |
          VERSION=$(uv run python - <<'PY'
          from pathlib import Path
          import yaml
          app = yaml.safe_load(
              Path("ha_cellular_gateway/config.yaml").read_text(encoding="utf-8")
          )
          print(app["version"])
          PY
          )
          docker buildx build \
            --platform linux/arm64 \
            --build-arg BUILD_VERSION="$VERSION" \
            --build-arg BUILD_ARCH=aarch64 \
            --file ha_cellular_gateway/Dockerfile \
            --tag haos-mobile-wan:ci \
            --load \
            ha_cellular_gateway

      - name: Smoke test app startup under AppArmor
        run: |
          sudo apparmor_parser -r ha_cellular_gateway/apparmor.txt
          output=$(docker run --rm \
            --security-opt apparmor=ha_cellular_gateway \
            --cap-add NET_ADMIN \
            --cap-add NET_RAW \
            --entrypoint /usr/bin/python3 \
            haos-mobile-wan:ci -c "import app.main; print('startup-ok')")
          echo "$output"
          echo "$output" | grep -q startup-ok

      - name: Generate image SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: haos-mobile-wan:ci
          format: cyclonedx
          output: trivy-sbom.cdx.json
          exit-code: "0"
          list-all-pkgs: true
          scanners: vuln

      - name: Upload image SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: haos-mobile-wan-sbom-${{ github.sha }}
          path: trivy-sbom.cdx.json
          if-no-files-found: error
          retention-days: 90

      - name: Scan image vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: haos-mobile-wan:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          scanners: vuln

  validate:
    name: validate
    if: always()
    needs:
      - quality
      - repository
      - image
    runs-on: ubuntu-latest
    steps:
      - name: Require every validation job
        env:
          IMAGE_RESULT: ${{ needs.image.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          REPOSITORY_RESULT: ${{ needs.repository.result }}
        run: |
          test "$IMAGE_RESULT" = success
          test "$QUALITY_RESULT" = success
          test "$REPOSITORY_RESULT" = success
